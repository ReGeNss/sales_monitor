name: Deploy to server

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest changes
        run: |
          cd ${{ secrets.PROJECT_PATH }}

          BEFORE=$(git rev-parse HEAD)
          git fetch origin master
          AFTER=$(git rev-parse origin/master)

          if [ "$BEFORE" = "$AFTER" ]; then
            echo "No new commits, skipping deploy"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
          echo "Changed files:"
          echo "$CHANGED"

          git reset --hard origin/master

          SERVICES=""

          if echo "$CHANGED" | grep -qE '^go/(scheduler/|scraper_app/|internal/|go\.(mod|sum))'; then
            SERVICES="$SERVICES scheduler"
          fi

          if echo "$CHANGED" | grep -qE '^go/(scraper_logs/|internal/|go\.(mod|sum))'; then
            SERVICES="$SERVICES scraper_logs"
          fi

          if echo "$CHANGED" | grep -qE '^go/(notifications_service/|internal/|go\.(mod|sum))'; then
            SERVICES="$SERVICES notifications_service"
          fi

          if echo "$CHANGED" | grep -qE '^(node/|package\.json|package-lock\.json)'; then
            SERVICES="$SERVICES api-monitor"
          fi

          if echo "$CHANGED" | grep -qE '^docker-compose\.yaml$'; then
            SERVICES="scheduler scraper_logs notifications_service api-monitor"
          fi

          if echo "$CHANGED" | grep -qE '^migrations/'; then
            echo "Running database migrations..."
            docker compose run --rm migrate
          fi

          SERVICES=$(echo "$SERVICES" | xargs)

          if [ -z "$SERVICES" ]; then
            echo "No service-related changes detected, skipping rebuild"
            exit 0
          fi

          echo "Rebuilding services: $SERVICES"
          docker compose build $SERVICES
          docker compose up -d --force-recreate $SERVICES
